# =============================
# MOCK / Demo Profile
# No external credentials required
# =============================
server.port=8080

# In-memory H2 — resets on restart (clean demo each time)
spring.datasource.url=jdbc:h2:mem:crqmockdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Dummy values — not used in mock mode (no real connections made)
onedrive.tenant-id=mock
onedrive.client-id=mock
onedrive.client-secret=mock
onedrive.file-path=/mock/crq-list.xlsx
onedrive.drive-user=mock

remedy.base-url=http://mock-remedy
remedy.username=mock
remedy.password=mock
remedy.approved-status=Request in Change

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=mock
spring.mail.password=mock
email.from=mock@demo.local
email.to=demo@demo.local
email.subject=CRQ Approved Notification

crq.scheduler.cron=0 30 17 * * ?
crq.adhoc.threshold-time=17:30

cors.allowed-origins=http://localhost:5173,http://localhost:3000
