# =============================
# SIT Environment Configuration
# =============================
server.port=8081

# =============================
# Database (PostgreSQL for SIT)
# =============================
spring.datasource.url=jdbc:postgresql://SIT_DB_HOST:5432/crqdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=SIT_DB_USER
spring.datasource.password=SIT_DB_PASSWORD
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console disabled in SIT
spring.h2.console.enabled=false

# =============================
# Microsoft Graph / OneDrive
# =============================
onedrive.tenant-id=SIT_AZURE_TENANT_ID
onedrive.client-id=SIT_AZURE_CLIENT_ID
onedrive.client-secret=SIT_AZURE_CLIENT_SECRET
onedrive.file-path=/CRQ/crq-list.xlsx
onedrive.drive-user=situser@yourcompany.com

# =============================
# Remedy API
# =============================
remedy.base-url=https://sit-remedy.yourcompany.com/api
remedy.username=SIT_REMEDY_USER
remedy.password=SIT_REMEDY_PASSWORD
remedy.approved-status=Request in Change

# =============================
# Email (SMTP)
# =============================
spring.mail.host=smtp.yourcompany.com
spring.mail.port=587
spring.mail.username=SIT_EMAIL@yourcompany.com
spring.mail.password=SIT_EMAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

email.from=crq-sit@yourcompany.com
email.to=sit-team@yourcompany.com
email.subject=[SIT] CRQ Approved Notification

# =============================
# Scheduler
# =============================
crq.scheduler.cron=0 30 17 * * ?

# =============================
# CORS (SIT frontend URL)
# =============================
cors.allowed-origins=http://sit-server:8080,http://sit-server.yourcompany.com
