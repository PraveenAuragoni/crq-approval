# Server
server.port=8081

# Application name
spring.application.name=crq-approval

# =============================
# Database (H2 for dev)
# =============================
spring.datasource.url=jdbc:h2:file:./data/crqdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =============================
# Microsoft Graph / OneDrive
# =============================
onedrive.tenant-id=YOUR_AZURE_TENANT_ID
onedrive.client-id=YOUR_AZURE_CLIENT_ID
onedrive.client-secret=YOUR_AZURE_CLIENT_SECRET
# Path to the Excel file inside OneDrive (e.g. /CRQ/crq-list.xlsx)
onedrive.file-path=/CRQ/crq-list.xlsx
# OneDrive user whose drive contains the file (use "me" for current user or UPN)
onedrive.drive-user=me

# =============================
# Remedy API
# =============================
remedy.base-url=https://your-remedy-server.example.com/api
remedy.username=YOUR_REMEDY_USERNAME
remedy.password=YOUR_REMEDY_PASSWORD
# Remedy status value that means "approved/request in change"
remedy.approved-status=Request in Change

# =============================
# Email (SMTP)
# =============================
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@example.com
spring.mail.password=YOUR_EMAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

email.from=crq-approval@example.com
email.to=team@example.com
email.subject=CRQ Approved Notification

# =============================
# Scheduler
# =============================
# Cron: runs every day at 5:30 PM server time
crq.scheduler.cron=0 30 17 * * ?

# =============================
# CORS
# =============================
cors.allowed-origins=http://localhost:5173,http://localhost:3000
